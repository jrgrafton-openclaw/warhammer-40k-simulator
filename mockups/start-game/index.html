<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warhammer 40,000 — Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cinzel+Decorative:wght@700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   WH40K Simulator — Start Game Splash Screen
   Self-contained: all CSS + JS inline.
   ============================================================ */

/* --- Reset & Tokens --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #060504;
  --gold:     #c9a352;
  --gold-dim: #5a4a28;
  --border:   #2a2010;
  --text:     #e8e0d0;
  --text-dim: #8a7a60;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Oswald', sans-serif;
  color: var(--text);
}

/* --- Parallax Background Layers --- */
.parallax-layer {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  will-change: transform;
}

.parallax-far  {
  background-image: url('assets/bg-far.webp');
  animation: drift-far 60s ease-in-out infinite alternate;
}
.parallax-mid  {
  background-image: url('assets/bg-mid.webp');
  animation: drift-mid 45s ease-in-out infinite alternate;
}
.parallax-near {
  background-image: url('assets/bg-near.webp');
  animation: drift-near 30s ease-in-out infinite alternate;
}

@keyframes drift-far  { from { transform: translateX(-30px); } to { transform: translateX(30px); } }
@keyframes drift-mid  { from { transform: translateX(-30px); } to { transform: translateX(30px); } }
@keyframes drift-near { from { transform: translateX(-30px); } to { transform: translateX(30px); } }

/* --- Noise / Grain Overlay --- */
.noise-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.06;
  /* Tiny 4×4 base64 noise PNG tiled */
  background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAMklEQVQIW2O4d+/efwYGBgYmBgYGBiYGBgZGZWVlBkdHRwYWEMnAwMDAxIAEGBgYAHYBBgFnk1cmAAAAAElFTkSuQmCC");
  background-repeat: repeat;
  z-index: 2;
}

/* --- Vignette --- */
.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  z-index: 3;
}

/* --- Ember Particles (pure CSS) --- */
.embers {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  overflow: hidden;
}

.ember {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: ember-rise linear infinite;
}

@keyframes ember-rise {
  0%   { opacity: 0; transform: translateY(0) translateX(0) scale(1); }
  10%  { opacity: 0.7; }
  50%  { opacity: 0.5; }
  90%  { opacity: 0.15; }
  100% { opacity: 0; transform: translateY(-100vh) translateX(40px) scale(0.3); }
}

/* Staggered embers — positions and timing set via inline style */

/* --- Aquila Watermark --- */
.aquila-watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 180px;
  color: var(--gold);
  opacity: 0.05;
  pointer-events: none;
  z-index: 5;
  line-height: 1;
}

/* --- Frosted Glass Panel --- */
.panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 480px;
  max-width: 90vw;
  padding: 48px 40px 40px;
  background: rgba(6, 5, 4, 0.88);
  backdrop-filter: blur(20px) saturate(120%);
  -webkit-backdrop-filter: blur(20px) saturate(120%);
  border: 1px solid rgba(201, 163, 82, 0.25);
  z-index: 10;
}

/* Corner bracket ornaments */
.panel::before,
.panel::after {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  pointer-events: none;
}
.panel::before {
  top: -1px;
  left: -1px;
  border-top: 2px solid var(--gold);
  border-left: 2px solid var(--gold);
}
.panel::after {
  bottom: -1px;
  right: -1px;
  border-bottom: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
}

/* --- Title Block --- */
.title-block {
  text-align: center;
  margin-bottom: 32px;
  opacity: 0;
  animation: fade-in 0.5s ease forwards;
  animation-delay: 0.2s;
}

.title-main {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 28px;
  line-height: 1;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(201, 163, 82, 0.35);
  margin-bottom: 10px;
}

.title-sub {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 11px;
  line-height: 1;
  letter-spacing: 6px;
  color: #4a3a1a;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* Gold gradient divider */
.divider {
  width: 60%;
  height: 1px;
  margin: 0 auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}

/* --- Menu Buttons --- */
.menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu-btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  height: 52px;
  background: rgba(6, 5, 4, 0.6);
  border: 1px solid rgba(201, 163, 82, 0.15);
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 11px;
  line-height: 1;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  transition: all 0.2s;

  /* Stagger-in animation (initial hidden state) */
  opacity: 0;
  transform: translateY(20px);
}

/* Stagger-in keyframes */
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.menu-btn:nth-child(1) { animation: slide-up 0.3s ease forwards; animation-delay: 0.7s; }
.menu-btn:nth-child(2) { animation: slide-up 0.3s ease forwards; animation-delay: 0.78s; }
.menu-btn:nth-child(3) { animation: slide-up 0.3s ease forwards; animation-delay: 0.86s; }

/* Active button hover */
.menu-btn.active:hover {
  border-color: var(--gold);
  background: rgba(201, 163, 82, 0.07);
  box-shadow: 0 0 20px rgba(201, 163, 82, 0.12);
}

/* Disabled button */
.menu-btn.disabled {
  color: #2a1e08;
  border-color: #1a1208;
  cursor: not-allowed;
  opacity: 0.5;
}

/* Override stagger animation final opacity for disabled */
.menu-btn.disabled {
  animation: slide-up-disabled 0.3s ease forwards;
}
.menu-btn:nth-child(2).disabled { animation-delay: 0.78s; }
.menu-btn:nth-child(3).disabled { animation-delay: 0.86s; }

@keyframes slide-up-disabled {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 0.5; transform: translateY(0); }
}

/* Suppress hover on disabled */
.menu-btn.disabled:hover {
  border-color: #1a1208;
  background: rgba(6, 5, 4, 0.6);
  box-shadow: none;
}

/* Tooltip for disabled buttons */
.menu-btn .tooltip {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(6, 5, 4, 0.95);
  border: 1px solid rgba(201, 163, 82, 0.3);
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 1px;
  padding: 5px 12px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}

.menu-btn.disabled:hover .tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Button icon */
.btn-icon {
  font-size: 14px;
  line-height: 1;
}

/* --- Mute Toggle --- */
.mute-toggle {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  background: rgba(6, 5, 4, 0.7);
  border: 1px solid rgba(201, 163, 82, 0.2);
  color: var(--gold);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: border-color 0.2s;
  line-height: 1;
}
.mute-toggle:hover {
  border-color: var(--gold);
}
</style>
</head>
<body>

<!-- ===================== PARALLAX BACKGROUND ===================== -->
<div class="parallax-layer parallax-far"></div>
<div class="parallax-layer parallax-mid"></div>
<div class="parallax-layer parallax-near"></div>

<!-- Noise grain overlay -->
<div class="noise-overlay"></div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- ===================== EMBER PARTICLES ===================== -->
<div class="embers" id="embers"></div>

<!-- ===================== AQUILA WATERMARK ===================== -->
<div class="aquila-watermark">⚜</div>

<!-- ===================== MAIN PANEL ===================== -->
<div class="panel">
  <!-- Title -->
  <div class="title-block">
    <div class="title-main">Warhammer 40,000</div>
    <div class="title-sub">Simulator</div>
    <div class="divider"></div>
  </div>

  <!-- Menu -->
  <div class="menu">
    <button class="menu-btn active" onclick="window.location.href='../phases/move/v0.23/index.html'">
      <span class="btn-icon">⚔</span> New Game
    </button>
    <button class="menu-btn disabled" disabled>
      <span class="tooltip">Coming Soon</span>
      <span class="btn-icon">💾</span> Load Game
    </button>
    <button class="menu-btn disabled" disabled>
      <span class="tooltip">Coming Soon</span>
      <span class="btn-icon">⚙</span> Settings
    </button>
  </div>
</div>

<!-- ===================== MUTE TOGGLE ===================== -->
<button class="mute-toggle" id="muteToggle" title="Toggle audio">🔊</button>

<!-- ===================== AUDIO ===================== -->
<audio id="ambientAudio" loop preload="none">
  <source src="assets/ambient-loop.mp3" type="audio/mpeg">
</audio>

<script>
/* =============================================================
   WH40K Simulator — Start Screen Logic
   ============================================================= */

// --- Ember Particle Generation ---
(function generateEmbers() {
  const container = document.getElementById('embers');
  const count = 13; // 10-15 range
  for (let i = 0; i < count; i++) {
    const ember = document.createElement('div');
    ember.className = 'ember';
    // Randomise position, size, timing
    const left = Math.random() * 100;
    const size = 2 + Math.random() * 2;          // 2-4px
    const duration = 6 + Math.random() * 10;      // 6-16s
    const delay = Math.random() * 12;             // stagger 0-12s
    const hue = Math.random() > 0.5 ? '#c9a352' : '#e8a020'; // gold / orange
    ember.style.cssText = `
      left: ${left}%;
      bottom: -10px;
      width: ${size}px;
      height: ${size}px;
      background: ${hue};
      box-shadow: 0 0 ${size + 2}px ${hue};
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
    `;
    container.appendChild(ember);
  }
})();

// --- Audio System ---
(function initAudio() {
  const audio = document.getElementById('ambientAudio');
  const btn   = document.getElementById('muteToggle');
  let started = false;

  // Restore mute state from localStorage
  const wasMuted = localStorage.getItem('wh40k-muted') === 'true';
  audio.muted = wasMuted;
  btn.textContent = wasMuted ? '🔇' : '🔊';

  // Start audio on first user interaction
  function tryPlay() {
    if (started) return;
    started = true;
    audio.play().catch(() => { /* audio file may be missing — degrade gracefully */ });
    document.removeEventListener('click', tryPlay);
    document.removeEventListener('keydown', tryPlay);
  }
  document.addEventListener('click', tryPlay);
  document.addEventListener('keydown', tryPlay);

  // Mute toggle
  btn.addEventListener('click', function (e) {
    e.stopPropagation(); // don't double-fire tryPlay via parent
    audio.muted = !audio.muted;
    btn.textContent = audio.muted ? '🔇' : '🔊';
    localStorage.setItem('wh40k-muted', audio.muted);
  });
})();
</script>

</body>
</html>
