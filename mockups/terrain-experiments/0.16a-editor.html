<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terrain Sprite Editor v0.16a</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#ccc;font-family:Inter,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:#0f1520;overflow-y:auto;padding:10px;font-size:11px}
.sidebar.left{border-right:1px solid #1a2a3a}
.sidebar.right{width:240px;min-width:240px;border-left:1px solid #1a2a3a;background:#0d131d}
.sidebar h3{color:#00d4ff;font-size:10px;letter-spacing:2px;margin:10px 0 4px;text-transform:uppercase}
.sidebar h3:first-child{margin-top:0}
.thumb-grid{display:flex;flex-wrap:wrap;gap:4px}
.thumb{width:72px;height:72px;border:1px solid #1a2a3a;border-radius:3px;cursor:grab;object-fit:cover;background:#0a0e18}
.thumb:hover{border-color:#00d4ff}
.bg-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.bg-row select{background:#0a0e18;color:#ccc;border:1px solid #1a2a3a;padding:3px 6px;border-radius:3px;font-size:10px;flex:1}
.tbtn{background:#0a0e18;color:#8090a0;border:1px solid #1a2a3a;padding:3px 8px;border-radius:3px;font-size:9px;cursor:pointer;white-space:nowrap}
.tbtn.on{border-color:#00d4ff;color:#00d4ff}
.toggle-row{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.map-wrapper{position:relative;display:inline-block}
#battlefield{display:block;background:#030609;border:1px solid #1a2a3a;border-radius:4px}
.obj-marker{position:absolute;pointer-events:none;transform:translate(-50%,-50%)}
.obj-ring{width:72px;height:72px;border:2px solid rgba(255,200,50,0.18);border-radius:50%}
.obj-hex{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.bottom{background:#0a0e14;border-top:1px solid #1a2a3a;padding:6px 12px;display:flex;gap:6px;align-items:center}
#debug{flex:1;background:#060a10;color:#0f8;border:1px solid #1a2a3a;font-family:monospace;font-size:9px;height:50px;resize:none;padding:4px;border-radius:3px}
.ghost{position:fixed;pointer-events:none;opacity:0.6;z-index:9999}
/* Layers panel */
.layers-panel{margin-top:8px;padding-top:6px}
.layer-row{display:flex;align-items:center;gap:4px;padding:4px;border-radius:3px;cursor:pointer;font-size:9px;border:1px solid transparent;margin-bottom:3px}
.layer-row:hover{background:#1a2a3a}
.layer-row.sel{border-color:#00d4ff;background:#0a1828}
.layer-row.dragging{opacity:.45}
.layer-row img{width:24px;height:24px;object-fit:cover;border-radius:2px;flex-shrink:0}
.layer-row .lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8090a0}
.layer-row .lmeta{font-size:8px;color:#4f6476}
.layer-row .lbtn{background:none;border:none;color:#607080;cursor:pointer;font-size:11px;padding:0 2px}
.layer-row .lbtn:hover{color:#00d4ff}
.layer-row.hidden-sprite .lname{opacity:0.4;text-decoration:line-through}
.layer-note{font-size:9px;color:#587088;margin:0 0 6px}
/* Selection rect */
.sel-rect{fill:rgba(0,212,255,0.08);stroke:#00d4ff;stroke-width:1;stroke-dasharray:4,2;pointer-events:none}
</style></head><body>
<div class="main">
<div class="sidebar left">
  <h3>Background</h3>
  <div class="bg-row">
    <select id="bgSel" onchange="setBg(this.value)">
      <option value="v16-ground-better.png">v16-ground-better</option>
      <option value="bg-variation-1.png">bg-variation-1</option>
      <option value="bg-variation-2.png">bg-variation-2</option>
      <option value="bg-variation-3.png">bg-variation-3</option>
      <option value="bg-variation-4.png">bg-variation-4 (oil)</option>
      <option value="bg-variation-5.png">bg-variation-5 (wet)</option>
      <option value="svg-gradient">— SVG: Gradient Depth —</option>
      <option value="svg-warm">— SVG: Warm Core —</option>
      <option value="svg-dual">— SVG: Dual Light Pools —</option>
      <option value="svg-haze">— SVG: Atmospheric Haze —</option>
      <option value="svg-concrete">— SVG: Concrete Slabs —</option>
      <option value="svg-tactical">— SVG: Frozen Synapse —</option>
    </select>
  </div>
  <h3>Toggles</h3>
  <div class="toggle-row">
    <button class="tbtn on" onclick="tgl(this,'svgRuins')">SVG Ruins</button>
    <button class="tbtn on" onclick="tgl(this,'svgScatter')">SVG Scatter</button>
    <button class="tbtn on" onclick="tgl(this,'deployZones')">Deploy</button>
    <button class="tbtn on" onclick="tgl(this,'modelLayer')">Models</button>
    <button class="tbtn" id="editModelsBtn" onclick="toggleModelEdit(this)">Edit Models</button>
    <button class="tbtn on" onclick="tgl(this,'objectives')">Obj</button>
  </div>
  <h3>SVG Ruins Opacity</h3>
  <div class="bg-row">
    <input type="range" min="0" max="100" value="92" style="flex:1;accent-color:#00d4ff" oninput="document.getElementById('svgRuins').style.opacity=this.value/100;document.getElementById('svgScatter').style.opacity=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span style="font-size:10px;width:30px">92%</span>
  </div>
  <h3>Roof Opacity</h3>
  <div class="bg-row">
    <input type="range" min="0" max="100" value="85" style="flex:1;accent-color:#00d4ff" oninput="document.getElementById('spriteTop').style.opacity=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span style="font-size:10px;width:30px">85%</span>
  </div>
  <h3>Ruins — Floor</h3>
  <div class="thumb-grid" id="tRuinsFloor"></div>
  <h3>Ruins — Top</h3>
  <div class="thumb-grid" id="tRuinsTop"></div>
  <h3>Scatter</h3>
  <div class="thumb-grid" id="tScatter"></div>
</div>
<div class="canvas-wrap">
  <div class="map-wrapper" id="mapWrap">
    <svg id="battlefield" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 528" width="1024" height="751">
      <defs>
        <radialGradient id="mg-fill" cx="38%" cy="32%" r="62%"><stop offset="0%" stop-color="#0a1020"/><stop offset="60%" stop-color="#060c14"/><stop offset="100%" stop-color="#030609"/></radialGradient>
        <filter id="mf-imp" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB"><feFlood flood-color="#00d4ff" flood-opacity="0.7" result="col"/><feComposite in="col" in2="SourceGraphic" operator="in" result="clipped"/><feGaussianBlur in="clipped" stdDeviation="2.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="mf-ork" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB"><feFlood flood-color="#ff4020" flood-opacity="0.7" result="col"/><feComposite in="col" in2="SourceGraphic" operator="in" result="clipped"/><feGaussianBlur in="clipped" stdDeviation="2.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="wallShadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity=".5"/></filter>
        <pattern id="floor-pat" width="24" height="24" patternUnits="userSpaceOnUse">
          <rect width="24" height="24" fill="#3a4044"/><rect x=".5" y=".5" width="11" height="11" fill="#424a4e" rx=".3"/>
          <rect x="12.5" y=".5" width="11" height="11" fill="#3e4648" rx=".3"/><rect x=".5" y="12.5" width="11" height="11" fill="#404848" rx=".3"/>
          <rect x="12.5" y="12.5" width="11" height="11" fill="#444c50" rx=".3"/>
          <line x1="0" y1="12" x2="24" y2="12" stroke="#2e3438" stroke-width=".5"/>
          <line x1="12" y1="0" x2="12" y2="24" stroke="#2e3438" stroke-width=".5"/>
        </pattern>
        <pattern id="wall-pat" width="16" height="10" patternUnits="userSpaceOnUse">
          <rect width="16" height="10" fill="#505a60"/><rect x="0" y="0" width="7" height="4" fill="#586268" rx=".3"/>
          <rect x="9" y="0" width="7" height="4" fill="#4e585e" rx=".3"/><rect x="4" y="6" width="7" height="4" fill="#545e64" rx=".3"/>
          <line x1="0" y1="5" x2="16" y2="5" stroke="#3a4044" stroke-width=".8"/>
          <line x1="8" y1="0" x2="8" y2="5" stroke="#3a4044" stroke-width=".8"/>
          <line x1="4" y1="5" x2="4" y2="10" stroke="#3a4044" stroke-width=".8"/>
          <line x1="12" y1="5" x2="12" y2="10" stroke="#3a4044" stroke-width=".8"/>
        </pattern>
        <!-- Ground option: Gradient Depth -->
        <radialGradient id="grd-depth" cx="50%" cy="45%" r="65%"><stop offset="0%" stop-color="#0e1822"/><stop offset="100%" stop-color="#060a0e"/></radialGradient>
        <!-- Ground option: Warm Core -->
        <radialGradient id="grd-warm" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#14181e"/><stop offset="50%" stop-color="#0c1018"/><stop offset="100%" stop-color="#060a0e"/></radialGradient>
        <radialGradient id="grd-warm-tint" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="rgba(40,30,15,0.06)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
        <!-- Ground option: Dual Light Pools -->
        <radialGradient id="grd-imp-pool" cx="22%" cy="50%" r="35%"><stop offset="0%" stop-color="rgba(0,80,120,0.04)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
        <radialGradient id="grd-ork-pool" cx="78%" cy="50%" r="35%"><stop offset="0%" stop-color="rgba(120,30,10,0.04)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
        <!-- Ground option: Atmospheric Haze -->
        <linearGradient id="grd-haze-band" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="35%" stop-color="rgba(15,20,28,0.04)"/><stop offset="55%" stop-color="rgba(15,20,28,0.04)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient>
        <!-- Ground option: Concrete slabs -->
        <pattern id="slab-pat" width="60" height="60" patternUnits="userSpaceOnUse">
          <rect width="60" height="60" fill="#0b1018"/>
          <rect x="1" y="1" width="58" height="58" fill="#0d1420" rx="1"/>
          <line x1="0" y1="0" x2="60" y2="0" stroke="#0a0e14" stroke-width="1.5"/>
          <line x1="0" y1="0" x2="0" y2="60" stroke="#0a0e14" stroke-width="1.5"/>
        </pattern>
        <!-- Ground option: Frozen Synapse tactical -->
        <pattern id="tac-grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <rect width="60" height="60" fill="#060c14"/>
          <line x1="0" y1="0" x2="60" y2="0" stroke="#00d4ff" stroke-width="0.4" opacity="0.06"/>
          <line x1="0" y1="0" x2="0" y2="60" stroke="#00d4ff" stroke-width="0.4" opacity="0.06"/>
          <line x1="0" y1="12" x2="60" y2="12" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="12" y1="0" x2="12" y2="60" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="0" y1="24" x2="60" y2="24" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="24" y1="0" x2="24" y2="60" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="0" y1="36" x2="60" y2="36" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="36" y1="0" x2="36" y2="60" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="0" y1="48" x2="60" y2="48" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
          <line x1="48" y1="0" x2="48" y2="60" stroke="#00d4ff" stroke-width="0.2" opacity="0.02"/>
        </pattern>
      </defs>
      <!-- SVG ground base -->
      <rect width="720" height="528" fill="#0c1218"/>
      <!-- SVG ground options (hidden by default, shown when selected) -->
      <g id="svgGroundGradient" style="display:none">
        <rect width="720" height="528" fill="url(#grd-depth)"/>
        <rect width="720" height="528" fill="url(#slab-pat)" opacity="0.15"/>
      </g>
      <g id="svgGroundWarm" style="display:none">
        <rect width="720" height="528" fill="url(#grd-warm)"/>
        <rect width="720" height="528" fill="url(#grd-warm-tint)"/>
        <rect width="720" height="528" fill="url(#slab-pat)" opacity="0.1"/>
      </g>
      <g id="svgGroundDual" style="display:none">
        <rect width="720" height="528" fill="url(#grd-depth)"/>
        <rect width="720" height="528" fill="url(#grd-imp-pool)"/>
        <rect width="720" height="528" fill="url(#grd-ork-pool)"/>
        <rect width="720" height="528" fill="url(#slab-pat)" opacity="0.08"/>
      </g>
      <g id="svgGroundHaze" style="display:none">
        <rect width="720" height="528" fill="url(#grd-depth)"/>
        <rect width="720" height="528" fill="url(#grd-haze-band)"/>
        <circle cx="180" cy="140" r="60" fill="#0e1822" opacity="0.3"/>
        <circle cx="540" cy="400" r="70" fill="#0e1822" opacity="0.25"/>
        <circle cx="360" cy="280" r="50" fill="#0e1822" opacity="0.2"/>
        <rect width="720" height="528" fill="url(#slab-pat)" opacity="0.1"/>
      </g>
      <g id="svgGroundConcrete" style="display:none">
        <rect width="720" height="528" fill="url(#slab-pat)"/>
        <path d="M50,80 Q180,90 300,75 Q450,60 600,85" fill="none" stroke="#080c12" stroke-width="1.5" opacity="0.6"/>
        <path d="M100,250 Q250,240 400,260 Q550,280 700,255" fill="none" stroke="#080c12" stroke-width="1" opacity="0.5"/>
        <path d="M20,400 Q200,410 380,395 Q500,385 680,405" fill="none" stroke="#080c12" stroke-width="1.2" opacity="0.5"/>
        <circle cx="200" cy="150" r="15" fill="url(#grd-depth)" opacity="0.3"/>
        <circle cx="550" cy="380" r="20" fill="url(#grd-depth)" opacity="0.25"/>
        <circle cx="400" cy="480" r="12" fill="url(#grd-depth)" opacity="0.2"/>
      </g>
      <g id="svgGroundTactical" style="display:none">
        <rect width="720" height="528" fill="url(#tac-grid)"/>
        <circle cx="200" cy="180" r="80" fill="#00d4ff" opacity="0.012"/>
        <circle cx="520" cy="350" r="100" fill="#00d4ff" opacity="0.01"/>
        <circle cx="360" cy="264" r="120" fill="#00d4ff" opacity="0.008"/>
        <rect x="0" y="0" width="720" height="1" fill="#00d4ff" opacity="0.03"><animate attributeName="y" from="0" to="528" dur="8s" repeatCount="indefinite"/></rect>
      </g>
      <!-- BG image -->
      <image id="bgImg" href="v16-ground-better.png" x="0" y="0" width="720" height="528" preserveAspectRatio="none"/>
      <!-- Deploy zones -->
      <g id="deployZones">
        <rect x="0" y="0" width="240" height="528" fill="rgba(0,140,200,0.06)"/>
        <line x1="240" y1="0" x2="240" y2="528" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="120" y="15" text-anchor="middle" font-family="Anton,sans-serif" font-size="10" letter-spacing="3" fill="rgba(0,212,255,0.15)">IMPERIUM DEPLOY</text>
        <rect x="480" y="0" width="240" height="528" fill="rgba(255,64,32,0.06)"/>
        <line x1="480" y1="0" x2="480" y2="528" stroke="rgba(255,64,32,0.3)" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="600" y="15" text-anchor="middle" font-family="Anton,sans-serif" font-size="10" letter-spacing="3" fill="rgba(255,64,32,0.15)">ORK DEPLOY</text>
      </g>
      <!-- Dropped floor sprites go here -->
      <g id="spriteFloor"></g>
      <!-- Dropped roof/top sprites go here -->
      <g id="spriteTop"></g>
      <!-- SVG terrain -->
      <g id="svgRuins" opacity="0.92" style="pointer-events:none">
        <g transform="translate(144,60) rotate(90) translate(-144,-60)"><path d="M 144 60 L 288 60 L 288 132 L 144 132 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 145.2 61.2 L 241.2 61.2 L 241.2 67.2 L 151.2 67.2 L 151.2 109.2 L 145.2 109.2 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(264,336) rotate(90) translate(-264,-336)"><path d="M 264 336 L 408 336 L 408 408 L 264 408 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 288 337.2 L 385.2 337.2 L 385.2 385.2 L 379.2 385.2 L 379.2 343.2 L 294 343.2 L 294 385.2 L 288 385.2 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(192,264) scale(-1,1) rotate(0) translate(-192,-264)"><path d="M 192 264 L 288 264 L 288 336 L 192 336 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 193.2 265.2 L 286.8 265.2 L 286.8 271.2 L 199.2 270 L 199.2 312 L 193.2 312 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(360,204) scale(-1,1) rotate(-45) translate(-360,-204)"><path d="M 360 204 L 438 204 L 438 264 L 360 264 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 361.2 205.2 L 436.8 205.2 L 436.8 211.2 L 367.2 211.2 L 367.2 262.8 L 361.2 262.8 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(576,468) rotate(-90) translate(-576,-468)"><path d="M 576 468 L 720 468 L 720 540 L 576 540 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 577.2 469.2 L 673.2 469.2 L 673.2 475.2 L 583.2 475.2 L 583.2 517.2 L 577.2 517.2 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(456,192) rotate(-90) translate(-456,-192)"><path d="M 456 192 L 600 192 L 600 264 L 456 264 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 480 193.2 L 577.2 193.2 L 577.2 241.2 L 571.2 241.2 L 571.2 199.2 L 486 199.2 L 486 241.2 L 480 241.2 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(528,264) scale(-1,1) rotate(-180) translate(-528,-264)"><path d="M 528 264 L 624 264 L 624 336 L 528 336 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 529.2 265.2 L 622.8 265.2 L 622.8 271.2 L 535.2 270 L 535.2 312 L 529.2 312 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(360,324) scale(-1,1) rotate(-225) translate(-360,-324)"><path d="M 360 324 L 438 324 L 438 384 L 360 384 Z" fill="rgba(58,64,64,0.75)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/><path d="M 361.2 325.2 L 436.8 325.2 L 436.8 331.2 L 367.2 331.2 L 367.2 382.8 L 361.2 382.8 Z" fill="rgba(106,114,114,0.85)" stroke="rgba(0,0,0,0.35)" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
      </g>
      <g id="svgScatter" style="pointer-events:none">
        <g transform="translate(48,264) rotate(0) translate(-48,-264)"><path d="M 48 264 L 96 264 L 96 336 L 48 336 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(336,0) rotate(0) translate(-336,0)"><path d="M 336 0 L 384 0 L 384 72 L 336 72 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(304.8,148.8) scale(-1,1) rotate(-45) translate(-304.8,-148.8)"><path d="M 304.8 148.8 L 346.8 148.8 L 346.8 208.8 L 304.8 208.8 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(317.76,247.2) scale(-1,1) rotate(-45) translate(-317.76,-247.2)"><path d="M 317.76 247.2 L 365.76 247.2 L 365.76 319.2 L 317.76 319.2 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(672,264) rotate(-180) translate(-672,-264)"><path d="M 672 264 L 720 264 L 720 336 L 672 336 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(384,528) rotate(-180) translate(-384,-528)"><path d="M 384 528 L 432 528 L 432 600 L 384 600 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(415.2,379.2) scale(-1,1) rotate(-225) translate(-415.2,-379.2)"><path d="M 415.2 379.2 L 457.2 379.2 L 457.2 439.2 L 415.2 439.2 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>
        <g transform="translate(402.24,280.8) scale(-1,1) rotate(-225) translate(-402.24,-280.8)"><path d="M 402.24 280.8 L 450.24 280.8 L 450.24 352.8 L 402.24 352.8 Z" fill="rgba(58,48,24,0.85)" stroke="#2e3020" stroke-width="1" vector-effect="non-scaling-stroke"/></g>

</div>
<script>
const NS='http://www.w3.org/2000/svg',svg=document.getElementById('battlefield');
const selUI=document.getElementById('selUI'),debug=document.getElementById('debug');

// Toggle layers
function tgl(btn,id){btn.classList.toggle('on');const el=document.getElementById(id);if(el)el.style.display=btn.classList.contains('on')?'':'none'}
function setBg(v){
  const img=document.getElementById('bgImg');
  ['svgGroundGradient','svgGroundWarm','svgGroundDual','svgGroundHaze','svgGroundConcrete','svgGroundTactical'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none'});
  if(v.startsWith('svg-')){img.style.display='none';
    const map={'svg-gradient':'svgGroundGradient','svg-warm':'svgGroundWarm','svg-dual':'svgGroundDual','svg-haze':'svgGroundHaze','svg-concrete':'svgGroundConcrete','svg-tactical':'svgGroundTactical'};
    if(map[v])document.getElementById(map[v]).style.display='';
  }else{img.style.display='';img.setAttribute('href',v)}
}

// Toolbox sprites
const thumbs={tRuinsFloor:['layer-bottom-aligned.png','layer-bottom-v2.png','layer-bottom-v3.png','layer-bottom-v4.png','layer-bottom-v5.png','t10-layer-bottom.png','openai-ruin-2.png','openai-ruin-1.png','openai-ruin-ushape.png'],tRuinsTop:['layer-top-aligned.png','layer-top-v2.png','layer-top-v3.png','layer-top-v4.png','layer-top-v5.png','t10-layer-top.png'],tScatter:['scatter-layer.png','scatter-v2.png','scatter-v3.png','scatter-v4.png','scatter-v5.png','scatter-v6.png','openai-scatter.png']};
Object.entries(thumbs).forEach(([id,files])=>{const c=document.getElementById(id);files.forEach(f=>{const img=document.createElement('img');img.className='thumb';img.src=f;img.dataset.file=f;img.dataset.cat=id;img.draggable=false;c.appendChild(img)})});

// Models (exact v0.5a positions, now draggable when Edit Models is on)
let modelEdit=false,allModels=[];
function toggleModelEdit(btn){modelEdit=!modelEdit;btn.classList.toggle('on',modelEdit);document.getElementById('modelLayer').style.pointerEvents=modelEdit?'auto':'none'}
function mkIcon(x,y,type){
  if(type==='cross')return`<line x1="${x}" y1="${y-3.06}" x2="${x}" y2="${y+3.06}" stroke="currentColor" stroke-width="1.224" stroke-linecap="round"/><line x1="${x-3.06}" y1="${y}" x2="${x+3.06}" y2="${y}" stroke="currentColor" stroke-width="1.224" stroke-linecap="round"/>`;
  if(type==='star'){let p='';for(let i=0;i<10;i++){const a=Math.PI/2+i*Math.PI/5,r=i%2?1.6:3.52;p+=`${(x+r*Math.cos(a)).toFixed(2)},${(y-r*Math.sin(a)).toFixed(2)} `}return`<polygon points="${p.trim()}" stroke="currentColor" stroke-width="0.765" fill="none"/>`}
  if(type==='diamond')return`<polygon points="${x},${y-3.196} ${x+2.5568},${y} ${x},${y+3.196} ${x-2.5568},${y}" stroke="currentColor" stroke-width="1.02" fill="none"/>`;
  return'';
}
function applyModel(m){
  if(m.kind==='circle'){
    m.base.setAttribute('cx',m.x);m.base.setAttribute('cy',m.y);
    m.icon.setAttribute('color',m.s==='#0088aa'?'#006688':'#882010');
    m.icon.innerHTML=mkIcon(m.x,m.y,m.iconType);
  }else{
    m.base.setAttribute('x',m.x);m.base.setAttribute('y',m.y);
    m.icon.innerHTML=`<rect x="${m.x+m.w/2-6}" y="${m.y+m.h/2-4}" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.9" fill="none"/><line x1="${m.x+m.w/2-6}" y1="${m.y+m.h/2}" x2="${m.x+m.w/2+6}" y2="${m.y+m.h/2}" stroke="currentColor" stroke-width="1.2"/>`;
  }
}
function addM(cx,cy,r,s,f,icon,type){const g=document.createElementNS(NS,'g');g.style.cursor='grab';const c=document.createElementNS(NS,'circle');c.setAttribute('r',r);c.setAttribute('fill','url(#mg-fill)');c.setAttribute('stroke',s);c.setAttribute('stroke-width','1.5');c.setAttribute('filter',f);g.appendChild(c);const ig=document.createElementNS(NS,'g');ig.setAttribute('fill','none');g.appendChild(ig);document.getElementById('modelLayer').appendChild(g);const m={kind:'circle',x:cx,y:cy,r,s,f,iconType:type,el:g,base:c,icon:ig};allModels.push(m);applyModel(m);g.onmousedown=e=>startModelMove(e,m)}
function addV(x,y,w,h,s,f){const g=document.createElementNS(NS,'g');g.style.cursor='grab';const r=document.createElementNS(NS,'rect');r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','4');r.setAttribute('fill','url(#mg-fill)');r.setAttribute('stroke',s);r.setAttribute('stroke-width','1.5');r.setAttribute('filter',f);g.appendChild(r);const ig=document.createElementNS(NS,'g');ig.setAttribute('color','#006688');ig.setAttribute('fill','none');g.appendChild(ig);document.getElementById('modelLayer').appendChild(g);const m={kind:'rect',x,y,w,h,s,f,el:g,base:r,icon:ig};allModels.push(m);applyModel(m);g.onmousedown=e=>startModelMove(e,m)}
function startModelMove(e,m){if(!modelEdit)return;e.stopPropagation();e.preventDefault();const p0=svgPt(e.clientX,e.clientY),ox=p0.x-m.x,oy=p0.y-m.y;
  const mv=e2=>{const p=svgPt(e2.clientX,e2.clientY);m.x=p.x-ox;m.y=p.y-oy;applyModel(m)};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}
document.getElementById('modelLayer').style.pointerEvents='none';
// Imperium
[[100,64],[117,64],[134,64],[108,81],[125,81]].forEach(([x,y])=>addM(x,y,8,'#0088aa','url(#mf-imp)',mkIcon(x,y,'cross'),'cross'));
addM(120,160,9,'#0088aa','url(#mf-imp)',mkIcon(120,160,'star'),'star');
[[80,300],[97,300],[114,300],[88,317],[105,317]].forEach(([x,y])=>addM(x,y,8,'#0088aa','url(#mf-imp)',mkIcon(x,y,'cross'),'cross'));
[[150,400],[167,400],[184,400],[158,417],[175,417]].forEach(([x,y])=>addM(x,y,8,'#0088aa','url(#mf-imp)',mkIcon(x,y,'diamond'),'diamond'));
addV(38.5,467.5,43,25,'#0088aa','url(#mf-imp)');
// Orks
addM(560,100,9,'#aa2810','url(#mf-ork)',mkIcon(560,100,'star'),'star');
[[500,200],[517,200],[534,200],[551,200],[568,200],[500,217],[517,217],[534,217],[551,217],[568,217]].forEach(([x,y])=>addM(x,y,8,'#aa2810','url(#mf-ork)',mkIcon(x,y,'cross'),'cross'));
addM(560,350,8,'#aa2810','url(#mf-ork)',mkIcon(560,350,'diamond'),'diamond');

// Objectives
const objPos=[[50,13.64],[16.67,50],[50,50],[83.33,50],[50,86.36]];
const objDiv=document.getElementById('objectives');
objPos.forEach(([l,t],i)=>{const d=document.createElement('div');d.className='obj-marker';d.style.cssText=`left:${l}%;top:${t}%`;d.innerHTML=`<div class="obj-ring"></div><svg class="obj-hex" width="28" height="28" viewBox="0 0 30 30"><polygon points="15,2 27,9 27,21 15,28 3,21 3,9" fill="rgba(0,0,0,0.5)" stroke="rgba(255,200,50,0.5)" stroke-width="1.5"/><text x="15" y="19" text-anchor="middle" font-family="Anton,sans-serif" font-size="12" fill="rgba(255,200,50,0.7)">${i+1}</text></svg>`;objDiv.appendChild(d)});

// --- Drag & Drop Editor ---
let sid=0,allSprites=[],selected=null,ghostEl=null,clipboardSprites=[];
function svgPt(ex,ey){const p=svg.createSVGPoint();p.x=ex;p.y=ey;return p.matrixTransform(svg.getScreenCTM().inverse())}

// Determine layer: top sprites go to spriteTop, floor sprites go to spriteFloor
function getLayer(file,cat){return cat==='tRuinsTop'?'spriteTop':'spriteFloor'}

document.querySelectorAll('.thumb').forEach(th=>{th.onmousedown=e=>{
  e.preventDefault();ghostEl=document.createElement('img');ghostEl.src=th.src;ghostEl.className='ghost';ghostEl.style.width='72px';document.body.appendChild(ghostEl);
  ghostEl.style.left=e.clientX-36+'px';ghostEl.style.top=e.clientY-36+'px';
  const file=th.dataset.file,cat=th.dataset.cat;
  const mv=e2=>{ghostEl.style.left=e2.clientX-36+'px';ghostEl.style.top=e2.clientY-36+'px'};
  const up=e2=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);ghostEl.remove();ghostEl=null;
    const pt=svgPt(e2.clientX,e2.clientY);if(pt.x>=0&&pt.x<=720&&pt.y>=0&&pt.y<=528)addSprite(file,pt.x-50,pt.y-40,100,80,0,getLayer(file,cat))};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}});

function addSprite(file,x,y,w,h,rot,layer){
  const id='s'+(sid++),img=document.createElementNS(NS,'image');
  img.setAttribute('href',file);img.setAttribute('x',x);img.setAttribute('y',y);img.setAttribute('width',w);img.setAttribute('height',h);img.setAttribute('preserveAspectRatio','none');
  if(rot)img.setAttribute('transform',`rotate(${rot},${x+w/2},${y+h/2})`);
  img.dataset.id=id;img.style.cursor='pointer';
  document.getElementById(layer).appendChild(img);
  const sp={id,file,x,y,w,h,rot,el:img,layer,hidden:false};allSprites.push(sp);
  img.onmousedown=e=>{e.stopPropagation();if(!multiSel.includes(sp)){select(sp)}startMoveMulti(e,sp)};
  select(sp);upDebug();save();rebuildLayers();return sp}

function select(sp){selected=sp;multiSel=[sp];drawSelectionUI();rebuildLayers()}
function deselect(){selected=null;multiSel=[];selUI.style.display='none';selUI.innerHTML='';rebuildLayers()}
function drawSelectionUI(){if(multiSel.length>1)drawMultiSel();else drawSel()}
function drawSel(){if(!selected){selUI.style.display='none';return}selUI.style.display='';selUI.innerHTML='';
  const s=selected,cx=s.x+s.w/2,cy=s.y+s.h/2;
  const r=document.createElementNS(NS,'rect');r.setAttribute('x',s.x-2);r.setAttribute('y',s.y-2);r.setAttribute('width',s.w+4);r.setAttribute('height',s.h+4);r.setAttribute('fill','none');r.setAttribute('stroke','#00d4ff');r.setAttribute('stroke-dasharray','4,3');r.setAttribute('stroke-width','1.5');
  if(s.rot)r.setAttribute('transform',`rotate(${s.rot},${cx},${cy})`);selUI.appendChild(r);
  [[s.x,s.y,'nw'],[s.x+s.w,s.y,'ne'],[s.x,s.y+s.h,'sw'],[s.x+s.w,s.y+s.h,'se']].forEach(([hx,hy,pos])=>{
    const h=document.createElementNS(NS,'rect');h.setAttribute('x',hx-3);h.setAttribute('y',hy-3);h.setAttribute('width',6);h.setAttribute('height',6);h.setAttribute('fill','#00d4ff');h.style.cursor=pos+'-resize';
    if(s.rot)h.setAttribute('transform',`rotate(${s.rot},${cx},${cy})`);h.onmousedown=e=>{e.stopPropagation();startResize(e,selected,pos)};selUI.appendChild(h)});
  const rh=document.createElementNS(NS,'circle');rh.setAttribute('cx',cx);rh.setAttribute('cy',s.y-16);rh.setAttribute('r',4);rh.setAttribute('fill','#00d4ff');rh.style.cursor='grab';
  if(s.rot)rh.setAttribute('transform',`rotate(${s.rot},${cx},${cy})`);rh.onmousedown=e=>{e.stopPropagation();startRotate(e,selected)};selUI.appendChild(rh)}

function startMove(e,sp){const pt=svgPt(e.clientX,e.clientY),ox=pt.x-sp.x,oy=pt.y-sp.y;
  const mv=e2=>{const p=svgPt(e2.clientX,e2.clientY);sp.x=p.x-ox;sp.y=p.y-oy;applySp(sp);drawSelectionUI();upDebug()};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}
function startResize(e,sp,c){e.preventDefault();const o={x:sp.x,y:sp.y,w:sp.w,h:sp.h},ar=o.w/o.h,p0=svgPt(e.clientX,e.clientY);
  const mv=e2=>{const p=svgPt(e2.clientX,e2.clientY),dx=p.x-p0.x,dy=p.y-p0.y;
    if(e2.shiftKey){// Preserve aspect ratio
      const d=Math.abs(dx)>Math.abs(dy)?dx:dy*ar;
      if(c.includes('e'))sp.w=Math.max(20,o.w+d);if(c.includes('w')){sp.x=o.x+d;sp.w=Math.max(20,o.w-d)}
      sp.h=sp.w/ar;if(c.includes('n'))sp.y=o.y+o.h-sp.h;
    }else{
      if(c.includes('e'))sp.w=Math.max(20,o.w+dx);if(c.includes('w')){sp.x=o.x+dx;sp.w=Math.max(20,o.w-dx)}
      if(c.includes('s'))sp.h=Math.max(20,o.h+dy);if(c.includes('n')){sp.y=o.y+dy;sp.h=Math.max(20,o.h-dy)}
    }
    applySp(sp);drawSelectionUI();upDebug()};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}
function startRotate(e,sp){e.preventDefault();const cx=sp.x+sp.w/2,cy=sp.y+sp.h/2;
  const mv=e2=>{const p=svgPt(e2.clientX,e2.clientY);sp.rot=Math.round(Math.atan2(p.x-cx,-(p.y-cy))*180/Math.PI);applySp(sp);drawSelectionUI();upDebug()};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}
function applySp(sp){const el=sp.el,cx=sp.x+sp.w/2,cy=sp.y+sp.h/2;el.setAttribute('x',sp.x);el.setAttribute('y',sp.y);el.setAttribute('width',sp.w);el.setAttribute('height',sp.h);el.setAttribute('transform',sp.rot?`rotate(${sp.rot},${cx},${cy})`:'')}
function upDebug(){debug.value=JSON.stringify(allSprites.map(s=>({id:s.id,file:s.file,x:Math.round(s.x),y:Math.round(s.y),w:Math.round(s.w),h:Math.round(s.h),rot:s.rot,layer:s.layer})),null,1)}

svg.addEventListener('mousedown',e=>{if(e.target===svg||e.target.id==='bgImg')deselect()});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='c'&&multiSel.length){
    clipboardSprites=multiSel.map(s=>({file:s.file,x:s.x,y:s.y,w:s.w,h:s.h,rot:s.rot,layer:s.layer,hidden:s.hidden}));
    e.preventDefault();return;
  }
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='v'&&clipboardSprites.length){
    deselect();
    multiSel=clipboardSprites.map(s=>addSprite(s.file,s.x+20,s.y+20,s.w,s.h,s.rot,s.layer));
    selected=multiSel[0];drawSelectionUI();save();e.preventDefault();return;
  }
  if(e.key==='Escape'){deselect();return}
  if(!selected)return;
  if(e.key==='Delete'||e.key==='Backspace'){
    const toDelete=multiSel.length>1?multiSel:[selected];
    toDelete.forEach(s=>{s.el.remove();allSprites=allSprites.filter(x=>x!==s)});
    deselect();upDebug();save();rebuildLayers();e.preventDefault()}
  if(e.key==='d'){multiSel=(multiSel.length?multiSel:[selected]).map(s=>addSprite(s.file,s.x+15,s.y+15,s.w,s.h,s.rot,s.layer));selected=multiSel[0];drawSelectionUI();}
  if(e.key==='r'||e.key==='R'){
    const step=e.shiftKey?45:15;
    if(multiSel.length>1){multiSel.forEach(s=>{s.rot=(s.rot+step)%360;applySp(s)});drawSelectionUI();}
    else{selected.rot=(selected.rot+step)%360;applySp(selected);drawSelectionUI();}
    upDebug();save()}
  if(e.key==='='||e.key==='+'){const layer=document.getElementById(selected.layer);const next=selected.el.nextElementSibling;if(next)layer.insertBefore(next,selected.el);save();rebuildLayers()}
  if(e.key==='-'){const layer=document.getElementById(selected.layer);const prev=selected.el.previousElementSibling;if(prev)layer.insertBefore(selected.el,prev);save();rebuildLayers()}
});

// --- Layers Panel ---
let draggedLayerId=null;
function rebuildLayers(){
  const list=document.getElementById('layersList');list.innerHTML='';
  allSprites.slice().reverse().forEach(sp=>{
    const row=document.createElement('div');row.draggable=true;row.dataset.id=sp.id;
    row.className='layer-row'+(multiSel.includes(sp)?' sel':'')+(sp.hidden?' hidden-sprite':'');
    row.innerHTML=`<img src="${sp.file}"><div style="flex:1;min-width:0"><div class="lname">${sp.file.replace(/\.(png|jpg)/,'')}</div><div class="lmeta">${sp.layer==='spriteTop'?'roof':'floor'} · ${Math.round(sp.x)},${Math.round(sp.y)}</div></div>
      <button class="lbtn" title="Toggle visibility" onclick="event.stopPropagation();toggleVis('${sp.id}')">${sp.hidden?'🔇':'👁'}</button>
      <button class="lbtn" title="Duplicate" onclick="event.stopPropagation();dupSprite('${sp.id}')">📋</button>
      <button class="lbtn" title="Delete" onclick="event.stopPropagation();delSprite('${sp.id}')">🗑</button>`;
    row.onclick=()=>{const s=allSprites.find(x=>x.id===sp.id);if(s){select(s)}};
    row.addEventListener('dragstart',()=>{draggedLayerId=sp.id;row.classList.add('dragging')});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');draggedLayerId=null});
    row.addEventListener('dragover',e=>e.preventDefault());
    row.addEventListener('drop',e=>{e.preventDefault();if(draggedLayerId&&draggedLayerId!==sp.id)reorderSpriteBefore(draggedLayerId,sp.id)});
    list.appendChild(row);
  });
}
function reorderSpriteBefore(srcId,targetId){
  const src=allSprites.find(s=>s.id===srcId),target=allSprites.find(s=>s.id===targetId);if(!src||!target)return;
  if(src.layer!==target.layer){src.layer=target.layer;document.getElementById(target.layer).appendChild(src.el)}
  target.el.parentNode.insertBefore(src.el,target.el);
  allSprites=allSprites.filter(s=>s!==src);
  const idx=allSprites.indexOf(target);allSprites.splice(idx,0,src);
  save();rebuildLayers();
}
function toggleVis(id){const sp=allSprites.find(s=>s.id===id);if(!sp)return;sp.hidden=!sp.hidden;sp.el.style.display=sp.hidden?'none':'';rebuildLayers();save()}
function dupSprite(id){const s=allSprites.find(x=>x.id===id);if(s)addSprite(s.file,s.x+15,s.y+15,s.w,s.h,s.rot,s.layer);rebuildLayers()}
function delSprite(id){const sp=allSprites.find(s=>s.id===id);if(!sp)return;sp.el.remove();allSprites=allSprites.filter(s=>s!==sp);if(selected===sp)deselect();upDebug();save();rebuildLayers()}

// --- Drag-to-Select Multiple ---
let multiSel=[];
const dragRectEl=document.getElementById('dragRect');
let isDragSelecting=false,dragStart=null;

svg.addEventListener('mousedown',e=>{
  if(e.target===svg||e.target.id==='bgImg'||e.target.tagName==='rect'&&!e.target.classList.contains('sel-handle')){
    // Check if clicking on empty area (not a sprite)
    const clickedSprite=allSprites.find(sp=>sp.el===e.target);
    if(!clickedSprite){
      deselect();multiSel=[];rebuildLayers();
      // Start drag-select
      isDragSelecting=true;dragStart=svgPt(e.clientX,e.clientY);
      dragRectEl.setAttribute('x',dragStart.x);dragRectEl.setAttribute('y',dragStart.y);
      dragRectEl.setAttribute('width',0);dragRectEl.setAttribute('height',0);
      dragRectEl.style.display='';
      const mv=e2=>{
        if(!isDragSelecting)return;
        const p=svgPt(e2.clientX,e2.clientY);
        const x=Math.min(dragStart.x,p.x),y=Math.min(dragStart.y,p.y);
        const w=Math.abs(p.x-dragStart.x),h=Math.abs(p.y-dragStart.y);
        dragRectEl.setAttribute('x',x);dragRectEl.setAttribute('y',y);
        dragRectEl.setAttribute('width',w);dragRectEl.setAttribute('height',h);
      };
      const up=e2=>{
        document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
        isDragSelecting=false;dragRectEl.style.display='none';
        // Find sprites in rect
        const p=svgPt(e2.clientX,e2.clientY);
        const rx=Math.min(dragStart.x,p.x),ry=Math.min(dragStart.y,p.y);
        const rw=Math.abs(p.x-dragStart.x),rh=Math.abs(p.y-dragStart.y);
        if(rw<5&&rh<5)return; // too small, just a click
        multiSel=allSprites.filter(sp=>!sp.hidden&&sp.x+sp.w>rx&&sp.x<rx+rw&&sp.y+sp.h>ry&&sp.y<ry+rh);
        if(multiSel.length>0){selected=multiSel[0];drawMultiSel();rebuildLayers()}
      };
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    }
  }
});

function drawMultiSel(){
  if(multiSel.length<=1){if(selected)drawSel();return}
  selUI.style.display='';selUI.innerHTML='';
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  multiSel.forEach(s=>{minX=Math.min(minX,s.x);minY=Math.min(minY,s.y);maxX=Math.max(maxX,s.x+s.w);maxY=Math.max(maxY,s.y+s.h)});
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  const r=document.createElementNS(NS,'rect');
  r.setAttribute('x',minX-3);r.setAttribute('y',minY-3);r.setAttribute('width',maxX-minX+6);r.setAttribute('height',maxY-minY+6);
  r.setAttribute('fill','none');r.setAttribute('stroke','#00d4ff');r.setAttribute('stroke-dasharray','6,3');r.setAttribute('stroke-width','1.5');
  selUI.appendChild(r);
  multiSel.forEach(s=>{
    const h=document.createElementNS(NS,'rect');
    h.setAttribute('x',s.x);h.setAttribute('y',s.y);h.setAttribute('width',s.w);h.setAttribute('height',s.h);
    h.setAttribute('fill','rgba(0,212,255,0.05)');h.setAttribute('stroke','#00d4ff');h.setAttribute('stroke-width','0.5');h.setAttribute('stroke-dasharray','3,2');
    if(s.rot)h.setAttribute('transform',`rotate(${s.rot},${s.x+s.w/2},${s.y+s.h/2})`);
    selUI.appendChild(h);
  });
  const rh=document.createElementNS(NS,'circle');
  rh.setAttribute('cx',cx);rh.setAttribute('cy',minY-18);rh.setAttribute('r',4);rh.setAttribute('fill','#00d4ff');rh.style.cursor='grab';
  rh.onmousedown=e=>{e.stopPropagation();startRotateMulti(e)};selUI.appendChild(rh);
}

// Multi-select move: when moving selected and multiSel has items, move all
function startMoveMulti(e,sp){
  if(multiSel.length>1&&multiSel.includes(sp)){
    const pt=svgPt(e.clientX,e.clientY);
    const offsets=multiSel.map(s=>({s,ox:pt.x-s.x,oy:pt.y-s.y}));
    const mv=e2=>{const p=svgPt(e2.clientX,e2.clientY);offsets.forEach(({s,ox,oy})=>{s.x=p.x-ox;s.y=p.y-oy;applySp(s)});drawSelectionUI();upDebug()};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  }else{
    multiSel=[sp];startMove(e,sp);
  }
}
function startRotateMulti(e){
  if(multiSel.length<=1)return;
  e.preventDefault();
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  multiSel.forEach(s=>{minX=Math.min(minX,s.x);minY=Math.min(minY,s.y);maxX=Math.max(maxX,s.x+s.w);maxY=Math.max(maxY,s.y+s.h)});
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  const a0=Math.atan2(svgPt(e.clientX,e.clientY).y-cy,svgPt(e.clientX,e.clientY).x-cx);
  const start=multiSel.map(s=>({s,x:s.x,y:s.y,rot:s.rot,cx:s.x+s.w/2,cy:s.y+s.h/2}));
  const mv=e2=>{
    const p=svgPt(e2.clientX,e2.clientY),a1=Math.atan2(p.y-cy,p.x-cx),da=a1-a0;
    const snap=e2.shiftKey?Math.PI/4:Math.PI/12,ang=Math.round(da/snap)*snap;
    start.forEach(o=>{const dx=o.cx-cx,dy=o.cy-cy,rcx=cx+dx*Math.cos(ang)-dy*Math.sin(ang),rcy=cy+dx*Math.sin(ang)+dy*Math.cos(ang);o.s.x=rcx-o.s.w/2;o.s.y=rcy-o.s.h/2;o.s.rot=o.rot+ang*180/Math.PI;applySp(o.s)});
    drawSelectionUI();upDebug();
  };
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save()};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}

// --- LocalStorage persistence ---
const STORAGE_KEY='wh40k-editor-layout';
function save(){
  const ranges=document.querySelectorAll('input[type=range]');
  const data={sprites:allSprites.map(s=>({file:s.file,x:s.x,y:s.y,w:s.w,h:s.h,rot:s.rot,layer:s.layer,hidden:s.hidden})),
    models:allModels.map(m=>m.kind==='circle'?{kind:m.kind,x:m.x,y:m.y,r:m.r,s:m.s,f:m.f,iconType:m.iconType}:{kind:m.kind,x:m.x,y:m.y,w:m.w,h:m.h,s:m.s,f:m.f}),
    bg:document.getElementById('bgSel').value,
    ruinsOpacity:ranges[0]?.value||92,
    roofOpacity:ranges[1]?.value||85};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
function loadSaved(){
  const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;
  try{const data=JSON.parse(raw);
    if(data.bg){document.getElementById('bgSel').value=data.bg;setBg(data.bg)}
    const ranges=document.querySelectorAll('input[type=range]');
    if(data.ruinsOpacity&&ranges[0]){ranges[0].value=data.ruinsOpacity;document.getElementById('svgRuins').style.opacity=data.ruinsOpacity/100;ranges[0].nextElementSibling.textContent=data.ruinsOpacity+'%'}
    if(data.roofOpacity&&ranges[1]){ranges[1].value=data.roofOpacity;document.getElementById('spriteTop').style.opacity=data.roofOpacity/100;ranges[1].nextElementSibling.textContent=data.roofOpacity+'%'}
    if(data.sprites)data.sprites.forEach(s=>{const sp=addSprite(s.file,s.x,s.y,s.w,s.h,s.rot,s.layer);sp.hidden=!!s.hidden;sp.el.style.display=sp.hidden?'none':''});
    if(data.models){document.getElementById('modelLayer').innerHTML='';allModels=[];data.models.forEach(m=>m.kind==='circle'?addM(m.x,m.y,m.r,m.s,m.f,mkIcon(m.x,m.y,m.iconType),m.iconType):addV(m.x,m.y,m.w,m.h,m.s,m.f))}
    deselect();
  }catch(e){console.warn('Failed to load layout',e)}
}
loadSaved();
upDebug();
rebuildLayers();
</script></body></html>
