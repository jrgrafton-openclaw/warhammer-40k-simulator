<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terrain Sprite Editor v0.16</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../shared/tokens/colors.css">
<link rel="stylesheet" href="../../shared/components/battlefield.css">
<link rel="stylesheet" href="editor.css?v=20260320m">
</head><body>
<div class="main">
<div class="sidebar left">
  <h3>Background</h3>
  <div class="bg-row">
    <select id="bgSel" onchange="Editor.Core.setBg(this.value)">
      <option value="v16-ground-better.png">v16-ground-better</option>
      <option value="bg-variation-1.png">bg-variation-1</option>
      <option value="bg-variation-2.png">bg-variation-2</option>
      <option value="bg-variation-3.png">bg-variation-3</option>
      <option value="bg-variation-4.png">bg-variation-4 (oil)</option>
      <option value="bg-variation-5.png">bg-variation-5 (wet)</option>
      <option value="svg-gradient">— SVG: Gradient Depth —</option>
      <option value="svg-warm">— SVG: Warm Core —</option>
      <option value="svg-dual">— SVG: Dual Light Pools —</option>
      <option value="svg-haze">— SVG: Atmospheric Haze —</option>
      <option value="svg-concrete">— SVG: Concrete Slabs —</option>
      <option value="svg-tactical">— SVG: Frozen Synapse —</option>
    </select>
  </div>
  <h3>Toggles</h3>
  <div class="toggle-row">
    <button class="tbtn on" onclick="Editor.Core.tgl(this,'svgRuins')">SVG Ruins</button>
    <button class="tbtn on" onclick="Editor.Core.tgl(this,'svgScatter')">SVG Scatter</button>
    <button class="tbtn on" onclick="Editor.Core.tgl(this,'deployZones')">Deploy</button>
    <button class="tbtn on" onclick="Editor.Core.tgl(this,'modelLayer')">Models</button>
    <button class="tbtn on" onclick="Editor.Core.tglMulti(this,['objectiveRings','objectiveHexes'])">Obj</button>
    <button class="tbtn on" onclick="Editor.Core.tgl(this,'lightLayer')">Lights</button>
  </div>
  <h3>SVG Ruins Opacity</h3>
  <div class="bg-row">
    <input type="range" min="0" max="100" value="92" style="flex:1;accent-color:#00d4ff" oninput="document.getElementById('svgRuins').style.opacity=this.value/100;document.getElementById('svgScatter').style.opacity=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span style="font-size:10px;width:30px">92%</span>
  </div>
  <h3>Roof Opacity</h3>
  <div class="bg-row">
    <input type="range" min="0" max="100" value="85" style="flex:1;accent-color:#00d4ff" oninput="document.getElementById('spriteTop').style.opacity=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span style="font-size:10px;width:30px">85%</span>
  </div>
  <h3>Ruins — Floor</h3>
  <div class="thumb-grid" id="tRuinsFloor"></div>
  <h3>Ruins — Top</h3>
  <div class="thumb-grid" id="tRuinsTop"></div>
  <h3>Scatter</h3>
  <div class="thumb-grid" id="tScatter"></div>
</div>
<div class="canvas-wrap">
  <div class="map-wrapper" id="mapWrap">

        <filter id="wallShadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity=".5"/></filter>
        <pattern id="floor-pat" width="24" height="24" patternUnits="userSpaceOnUse">

        <pattern id="wall-pat" width="16" height="10" patternUnits="userSpaceOnUse">

        <radialGradient id="grd-warm" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#14181e"/><stop offset="50%" stop-color="#0c1018"/><stop offset="100%" stop-color="#060a0e"/></radialGradient>
        <radialGradient id="grd-warm-tint" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="rgba(40,30,15,0.06)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>

      <rect width="720" height="528" fill="#0c1218"/>

</div>
<div class="sidebar right">
  <div class="layers-panel">
    <h3>Layers</h3>
    <div class="layer-note">Drag rows to reorder. ⌘C/V copy/paste. ⌘G group.</div>
    <div id="layersList"></div>
  </div>
  <div class="shortcuts-row" style="margin-top:8px;display:flex;gap:4px">
    <button class="tbtn" onclick="Editor.Shortcuts.toggle()" style="flex:1">? Shortcuts</button>
    <button class="tbtn" onclick="Editor.Zoom.reset()">Reset Zoom</button>
  </div>
  <div class="config-panel">
    <h3>Scene Config</h3>
    <textarea id="debug" readonly></textarea>
    <div class="config-actions">
      <button class="tbtn" onclick="navigator.clipboard.writeText(debug.value)">Copy JSON</button>
      <button class="tbtn" onclick="if(confirm('Clear all placed sprites?')){localStorage.removeItem('wh40k-editor-v016-layout');location.reload()}" style="color:#cc4444;border-color:#cc444433">Clear All</button>
    </div>
  </div>
</div>
</div>
