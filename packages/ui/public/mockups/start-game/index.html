<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH40K Simulator — Start Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Shared design tokens -->
  <link rel="stylesheet" href="../shared/tokens/colors.css">
  <link rel="stylesheet" href="../shared/tokens/typography.css">
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="splash-root">

  <!-- ══ LAYER 1: Background image (single cathedral painting) ══ -->
  <div class="bg-image"></div>
  <div class="bg-dim"></div>

  <!-- ══ LAYER 2: CSS fog overlays ══ -->
  <div class="fog-layer fog-low"></div>
  <div class="fog-layer fog-mid"></div>
  <div class="fog-layer fog-mid-alt"></div>

  <!-- ══ LAYER 3: SVG smoke wisps ══ -->
  <div class="smoke-container">
    <svg class="smoke-wisp smoke-left" viewBox="0 0 200 400" fill="none">
      <path d="M100,400 Q80,350 90,300 Q100,250 70,200 Q50,150 80,100 Q95,60 85,20"
            stroke="rgba(200,210,220,0.15)" stroke-width="40" stroke-linecap="round"
            fill="none" filter="blur(8px)"/>
    </svg>
    <svg class="smoke-wisp smoke-right" viewBox="0 0 180 350" fill="none">
      <path d="M90,350 Q110,300 100,250 Q85,200 110,150 Q130,100 105,50"
            stroke="rgba(200,210,220,0.12)" stroke-width="35" stroke-linecap="round"
            fill="none" filter="blur(10px)"/>
    </svg>
    <svg class="smoke-wisp smoke-center" viewBox="0 0 160 300" fill="none">
      <path d="M80,300 Q60,260 75,220 Q90,180 65,130 Q50,90 70,40"
            stroke="rgba(200,210,220,0.1)" stroke-width="30" stroke-linecap="round"
            fill="none" filter="blur(12px)"/>
    </svg>
  </div>

  <!-- ══ LAYER 4: CSS ember particles ══ -->
  <div class="ember-field" id="ember-field"></div>

  <!-- ══ Overlays: vignette + grain + scanlines ══ -->
  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="scanlines"></div>

  <!-- ══ Main panel ══ -->
  <div class="splash-panel">
    <div class="splash-corners" style="position:absolute;inset:0;pointer-events:none;"></div>
    <div class="splash-glow"></div>
    <div class="splash-aquila">⚜</div>

    <div class="splash-header">
      <div class="splash-label">10th Edition</div>
      <div class="splash-title">Warhammer 40,000</div>
      <div class="splash-subtitle">Battle Simulator</div>
    </div>

    <div class="splash-divider">
      <div class="splash-divider-line"></div>
      <span class="splash-divider-ornament">✦</span>
      <div class="splash-divider-line"></div>
    </div>

    <div class="splash-menu">
      <button class="menu-btn primary" onclick="window.location.href='../phases/deploy/v0.2/index.html'">
        <span class="btn-icon">⚔</span> New Game
      </button>
      <button class="menu-btn disabled">
        <span class="btn-icon">💾</span> Load Game
        <span class="tooltip">Coming Soon</span>
      </button>
      <button class="menu-btn disabled">
        <span class="btn-icon">⚙</span> Settings
        <span class="tooltip">Coming Soon</span>
      </button>
    </div>
  </div>

  <!-- ── Version badge ── -->
  <div class="version-badge">v0.2 · Start Game</div>

  <!-- ── Back to mockups ── -->
  <a class="splash-backlink" href="../index.html#start-game">← Mockups</a>

  <!-- ── Mute toggle ── -->
  <button class="mute-toggle" id="mute-toggle" title="Toggle audio">🔊</button>
</div>

<!-- ── Audio ── -->
<audio id="ambient-audio" loop preload="auto">
  <source src="assets/ambient-loop.mp3" type="audio/mpeg">
</audio>

<script>
  /* ── Ember particles (programmatic for variety) ── */
  (function() {
    const field = document.getElementById('ember-field');
    const count = 20;
    const types = ['warm', 'warm', 'warm', 'hot', 'hot', 'cyan'];

    for (let i = 0; i < count; i++) {
      const ember = document.createElement('div');
      const type = types[Math.floor(Math.random() * types.length)];
      const size = 2 + Math.random() * 3;
      const drift = -30 + Math.random() * 60;

      ember.className = 'ember ember--' + type;
      ember.style.left = (Math.random() * 100) + '%';
      ember.style.bottom = -(Math.random() * 10) + '%';
      ember.style.width = size + 'px';
      ember.style.height = size + 'px';
      ember.style.setProperty('--drift', drift + 'px');
      ember.style.animationName = 'ember-rise';
      ember.style.animationDuration = (6 + Math.random() * 14) + 's';
      ember.style.animationDelay = (Math.random() * 12) + 's';
      ember.style.animationIterationCount = 'infinite';
      ember.style.animationTimingFunction = 'linear';

      field.appendChild(ember);
    }
  })();

  /* ── Audio ── */
  (function() {
    const audio = document.getElementById('ambient-audio');
    const btn = document.getElementById('mute-toggle');
    let started = false;
    const wasMuted = localStorage.getItem('wh40k-splash-muted') === 'true';

    audio.volume = 0.65;
    if (wasMuted) {
      audio.muted = true;
      btn.textContent = '🔇';
    }

    function startAudio() {
      if (started) return;
      started = true;
      audio.play().catch(function() {});
    }

    /* Start on first interaction */
    document.addEventListener('click', startAudio, { once: true });
    document.addEventListener('keydown', startAudio, { once: true });

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      startAudio();
      audio.muted = !audio.muted;
      btn.textContent = audio.muted ? '🔇' : '🔊';
      localStorage.setItem('wh40k-splash-muted', String(audio.muted));
    });
  })();
</script>

</body>
</html>
