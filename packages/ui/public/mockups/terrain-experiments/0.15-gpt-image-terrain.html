<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v0.15 — GPT Image Terrain Compositor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#ccc;font-family:'Segoe UI',sans-serif;padding:20px}
h1{color:#00d4ff;font-size:22px;margin-bottom:4px}
.subtitle{color:#667;font-size:13px;margin-bottom:20px}
.section-label{font-size:16px;color:#00d4ff;border-bottom:1px solid #1e2d44;padding-bottom:6px;margin:24px 0 12px}
.cards{display:flex;gap:16px;flex-wrap:wrap}
.card{background:#0f1520;border:1px solid #1e2d44;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.card-title{font-size:13px;color:#00d4ff;font-weight:600}
.terrain-container{position:relative;background:#080c10;overflow:hidden;border-radius:4px}
.terrain-container img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.terrain-container svg{position:absolute;top:0;left:0;width:100%;height:100%}
.controls{display:flex;gap:10px;flex-wrap:wrap}
.controls label{font-size:11px;color:#889;cursor:pointer;display:flex;align-items:center;gap:3px}
.controls input[type=checkbox]{accent-color:#00d4ff}
.bf-wrap{position:relative;width:1080px;height:792px;background:#080c10;border-radius:6px;overflow:hidden;border:1px solid #1e2d44}
.bf-wrap img,.bf-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}
.bf-controls{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.bf-controls label{font-size:12px;color:#aab;cursor:pointer;display:flex;align-items:center;gap:4px}
details{margin-top:20px;background:#0f1520;border:1px solid #1e2d44;border-radius:8px;padding:12px}
details summary{color:#00d4ff;cursor:pointer;font-size:14px}
details .legacy-imgs{display:flex;gap:10px;margin-top:10px}
details .legacy-imgs img{width:200px;border-radius:4px;border:1px solid #1e2d44}
.gen-section{background:#0f1520;border:1px solid #1e2d44;border-radius:8px;padding:14px;margin-top:16px;max-width:600px}
.gen-section input,.gen-section textarea{width:100%;background:#080c10;border:1px solid #1e2d44;color:#ccc;padding:6px 8px;border-radius:4px;font-size:12px;margin-bottom:8px}
.gen-section textarea{height:50px;resize:vertical}
.gen-section button{background:#00d4ff;color:#0f1520;border:none;padding:6px 16px;border-radius:4px;font-weight:600;cursor:pointer;font-size:12px}
.gen-section button:hover{opacity:0.85}
.gen-result{margin-top:10px}
.gen-result img{max-width:300px;border-radius:4px;border:1px solid #1e2d44}
</style>
</head>
<body>
<h1>v0.15 — GPT Image Terrain Compositor</h1>
<p class="subtitle">AI-generated terrain layers composited with SVG paths and unit models</p>

<!-- SECTION 1: Composited Terrain Pieces -->
<div class="section-label">§1 Composited Terrain Pieces</div>
<div class="cards" id="cards"></div>

<!-- SECTION 2: Full Battlefield Map -->
<div class="section-label">§2 Full Battlefield Map (1.5× scale)</div>
<div class="bf-controls" id="bf-controls">
  <label><input type="checkbox" checked data-bf="ground"> Battlefield</label>
  <label><input type="checkbox" checked data-bf="svg"> SVG Terrain</label>
  <label><input type="checkbox" checked data-bf="floor"> Floor Layer</label>
  <label><input type="checkbox" checked data-bf="models"> Models</label>
  <label><input type="checkbox" checked data-bf="top"> Top Layer</label>
</div>
<div class="bf-wrap" id="bf-wrap"></div>

<!-- SECTION 3: Legacy -->
<div class="section-label">§3 Legacy</div>
<details>
  <summary>Gemini Terrain Experiments</summary>
  <div class="legacy-imgs">
    <img src="gemini-ruin-1.png" alt="Gemini ruin 1">
    <img src="gemini-ruin-2.jpg" alt="Gemini ruin 2">
  </div>
</details>

<!-- SECTION 4: Interactive Generation -->
<div class="section-label">§4 Interactive Generation</div>
<div class="gen-section">
  <textarea id="gen-prompt" placeholder="Describe the terrain texture...">Top-down dark gothic ruins floor texture, cracked stone tiles, 40K grimdark style, seamless, dark palette</textarea>
  <input id="gen-key" type="password" placeholder="OpenAI API key">
  <button onclick="generateImage()">Generate via GPT Image Edit</button>
  <div class="gen-result" id="gen-result"></div>
</div>

<script>
// ── Terrain Data (EXACT from terrain-data.js) ──
const terrain=[
{id:'t1',type:'ruins',paths:[{d:'M 144 60 L 288 60 L 288 132 L 144 132 L 144 60',fill:'rgba(58,64,64,0.75)'},{d:'M 145.2 61.2 L 241.2 61.2 L 241.2 67.2 L 151.2 67.2 L 151.2 109.2 L 145.2 109.2 L 145.2 61.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t2',type:'ruins',paths:[{d:'M 264 336 L 408 336 L 408 408 L 264 408 L 264 336',fill:'rgba(58,64,64,0.75)'},{d:'M 288 337.2 L 385.2 337.2 L 385.2 385.2 L 379.2 385.2 L 379.2 343.2 L 294 343.2 L 294 385.2 L 288 385.2 L 288 337.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t3',type:'ruins',paths:[{d:'M 192 264 L 288 264 L 288 336 L 192 336 L 192 264',fill:'rgba(58,64,64,0.75)'},{d:'M 193.2 265.2 L 286.8 265.2 L 286.8 271.2 L 199.2 270 L 199.2 312 L 193.2 312 L 193.2 265.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t4',type:'scatter',paths:[{d:'M 48 264 L 96 264 L 96 336 L 48 336 L 48 264',fill:'rgba(58,48,24,0.7)'}]},
{id:'t5',type:'scatter',paths:[{d:'M 336 0 L 384 0 L 384 72 L 336 72 L 336 0',fill:'rgba(58,48,24,0.7)'}]},
{id:'t6',type:'ruins',paths:[{d:'M 360 204 L 438 204 L 438 264 L 360 264 L 360 204',fill:'rgba(58,64,64,0.75)'},{d:'M 361.2 205.2 L 436.8 205.2 L 436.8 211.2 L 367.2 211.2 L 367.2 262.8 L 361.2 262.8 L 361.2 205.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t7',type:'scatter',paths:[{d:'M 304.8 148.8 L 346.8 148.8 L 346.8 208.8 L 304.8 208.8 L 304.8 148.8',fill:'rgba(58,48,24,0.7)'}]},
{id:'t8',type:'scatter',paths:[{d:'M 317.76 247.2 L 365.76 247.2 L 365.76 319.2 L 317.76 319.2 L 317.76 247.2',fill:'rgba(58,48,24,0.7)'}]},
{id:'t9',type:'ruins',paths:[{d:'M 576 468 L 720 468 L 720 540 L 576 540 L 576 468',fill:'rgba(58,64,64,0.75)'},{d:'M 577.2 469.2 L 673.2 469.2 L 673.2 475.2 L 583.2 475.2 L 583.2 517.2 L 577.2 517.2 L 577.2 469.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t10',type:'ruins',paths:[{d:'M 456 192 L 600 192 L 600 264 L 456 264 L 456 192',fill:'rgba(58,64,64,0.75)'},{d:'M 480 193.2 L 577.2 193.2 L 577.2 241.2 L 571.2 241.2 L 571.2 199.2 L 486 199.2 L 486 241.2 L 480 241.2 L 480 193.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t11',type:'ruins',paths:[{d:'M 528 264 L 624 264 L 624 336 L 528 336 L 528 264',fill:'rgba(58,64,64,0.75)'},{d:'M 529.2 265.2 L 622.8 265.2 L 622.8 271.2 L 535.2 270 L 535.2 312 L 529.2 312 L 529.2 265.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t12',type:'scatter',paths:[{d:'M 672 264 L 720 264 L 720 336 L 672 336 L 672 264',fill:'rgba(58,48,24,0.7)'}]},
{id:'t13',type:'scatter',paths:[{d:'M 384 528 L 432 528 L 432 600 L 384 600 L 384 528',fill:'rgba(58,48,24,0.7)'}]},
{id:'t14',type:'ruins',paths:[{d:'M 360 324 L 438 324 L 438 384 L 360 384 L 360 324',fill:'rgba(58,64,64,0.75)'},{d:'M 361.2 325.2 L 436.8 325.2 L 436.8 331.2 L 367.2 331.2 L 367.2 382.8 L 361.2 382.8 L 361.2 325.2',fill:'rgba(106,114,114,0.85)'}]},
{id:'t15',type:'scatter',paths:[{d:'M 415.2 379.2 L 457.2 379.2 L 457.2 439.2 L 415.2 439.2 L 415.2 379.2',fill:'rgba(58,48,24,0.7)'}]},
{id:'t16',type:'scatter',paths:[{d:'M 402.24 280.8 L 450.24 280.8 L 450.24 352.8 L 402.24 352.8 L 402.24 280.8',fill:'rgba(58,48,24,0.7)'}]}
];

// ── Image mapping ──
function getImages(t){
  const id=t.id;
  if(id==='t1'||id==='t9') return {bottom:'layer-bottom-aligned.png',top:'layer-top-aligned.png'};
  if(id==='t2'||id==='t10') return {bottom:'t10-layer-bottom.png',top:'openai-ruin-ushape.png'};
  if(id==='t3'||id==='t6'||id==='t11'||id==='t14') return {bottom:'openai-ruin-2.png',top:null};
  return {bottom:'scatter-layer.png',top:null};
}

// ── Bounding box helper ──
function bbox(t){
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  t.paths.forEach(p=>{
    const nums=p.d.match(/[\d.]+/g).map(Number);
    for(let i=0;i<nums.length;i+=2){x0=Math.min(x0,nums[i]);x1=Math.max(x1,nums[i]);y0=Math.min(y0,nums[i+1]);y1=Math.max(y1,nums[i+1]);}
  });
  return {x:x0,y:y0,w:x1-x0,h:y1-y0};
}

// ── Model icon SVG generators ──
function iconInfantry(cx,cy,r,color){
  return `<line x1="${cx-r}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="${color}" stroke-width="1.5"/>
  <line x1="${cx}" y1="${cy-r}" x2="${cx}" y2="${cy+r}" stroke="${color}" stroke-width="1.5"/>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="1"/>`;
}
function iconCharacter(cx,cy,r,color){
  let pts=[];for(let i=0;i<20;i++){const a=Math.PI*2*i/20-Math.PI/2;const rad=i%2===0?r:r*0.5;pts.push((cx+rad*Math.cos(a)).toFixed(1)+','+(cy+rad*Math.sin(a)).toFixed(1));}
  return `<polygon points="${pts.join(' ')}" fill="${color}" opacity="0.9"/>`;
}
function iconElite(cx,cy,r,color){
  return `<polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
}
function iconVehicle(cx,cy,r,color){
  const hw=r*1.2,hh=r*0.8;
  return `<rect x="${cx-hw}" y="${cy-hh}" width="${hw*2}" height="${hh*2}" rx="3" fill="none" stroke="${color}" stroke-width="1.5"/>
  <line x1="${cx-hw}" y1="${cy}" x2="${cx+hw}" y2="${cy}" stroke="${color}" stroke-width="1"/>`;
}
function modelSvg(cx,cy,r,type,color){
  if(type==='infantry') return iconInfantry(cx,cy,r,color);
  if(type==='character') return iconCharacter(cx,cy,r,color);
  if(type==='elite') return iconElite(cx,cy,r,color);
  if(type==='vehicle') return iconVehicle(cx,cy,r,color);
  return '';
}

// ── Units ──
const IMP='#00d4ff',ORK='#ff4020';
const units=[
  // Imperium
  ...[[92,72],[100,72],[108,72],[100,84],[108,84]].map(([x,y])=>({x,y,r:8,type:'infantry',color:IMP})),
  {x:120,y:160,r:9,type:'character',color:IMP},
  ...[[72,292],[80,292],[88,292],[80,308],[88,308]].map(([x,y])=>({x,y,r:8,type:'infantry',color:IMP})),
  ...[[142,392],[150,392],[158,392],[146,408],[154,408]].map(([x,y])=>({x,y,r:8,type:'elite',color:IMP})),
  {x:60,y:480,r:22,type:'vehicle',color:IMP},
  // Orks
  {x:560,y:100,r:9,type:'character',color:ORK},
  ...[[500,200],[517,200],[534,200],[551,200],[568,200],[500,217],[517,217],[534,217],[551,217],[568,217]].map(([x,y])=>({x,y,r:8,type:'infantry',color:ORK})),
  {x:560,y:350,r:8,type:'elite',color:ORK}
];

// ── Objectives ──
const objectives=[{x:360,y:72},{x:120,y:264},{x:360,y:264},{x:600,y:264},{x:360,y:456}];
function hexSvg(cx,cy,r,color){
  let pts=[];for(let i=0;i<6;i++){const a=Math.PI*2*i/6-Math.PI/6;pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}
  return `<polygon points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" opacity="0.8"/>
  <text x="${cx}" y="${cy+3}" text-anchor="middle" fill="${color}" font-size="8" font-weight="bold">${objectives.indexOf(arguments[3])+1}</text>`;
}

// ── SECTION 1: Terrain Cards ──
const cardDefs=[
  {t:terrain[0],label:'t1 L-Ruins',w:300,h:150,models:[[200,90,'infantry'],[250,110,'infantry']],hasTop:true},
  {t:terrain[9],label:'t10 U-Ruins',w:300,h:150,models:[[520,220,'infantry'],[550,240,'infantry']],hasTop:true},
  {t:terrain[2],label:'t3 Small Ruins',w:200,h:150,models:[[240,300,'infantry']],hasTop:false},
  {t:terrain[3],label:'t4 Scatter',w:100,h:150,models:[[72,300,'infantry']],hasTop:false}
];

const cardsEl=document.getElementById('cards');
cardDefs.forEach((cd,ci)=>{
  const b=bbox(cd.t);const imgs=getImages(cd.t);
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<div class="card-title">${cd.label}</div>
    <div class="terrain-container" style="width:${cd.w}px;height:${cd.h}px" id="tc${ci}">
      <img class="lyr-bottom" src="${imgs.bottom}" style="z-index:1">
      <svg class="lyr-svg" viewBox="${b.x} ${b.y} ${b.w} ${b.h}" preserveAspectRatio="none" style="z-index:2">
        ${cd.t.paths.map(p=>`<path d="${p.d}" fill="${p.fill}"/>`).join('')}
      </svg>
      <svg class="lyr-models" viewBox="${b.x} ${b.y} ${b.w} ${b.h}" preserveAspectRatio="none" style="z-index:3">
        ${cd.models.map(m=>modelSvg(m[0],m[1],8,m[2],IMP)).join('')}
      </svg>
      ${imgs.top?`<img class="lyr-top" src="${imgs.top}" style="z-index:4">`:''}
    </div>
    <div class="controls">
      <label><input type="checkbox" checked onchange="togLyr(${ci},'svg',this.checked)"> SVG</label>
      <label><input type="checkbox" checked onchange="togLyr(${ci},'bottom',this.checked)"> Bottom</label>
      <label><input type="checkbox" checked onchange="togLyr(${ci},'models',this.checked)"> Models</label>
      ${imgs.top?`<label><input type="checkbox" checked onchange="togLyr(${ci},'top',this.checked)"> Top</label>`:''}
    </div>`;
  cardsEl.appendChild(card);
});

function togLyr(ci,layer,on){
  const c=document.getElementById('tc'+ci);
  const map={svg:'.lyr-svg',bottom:'.lyr-bottom',models:'.lyr-models',top:'.lyr-top'};
  const el=c.querySelector(map[layer]);
  if(el) el.style.display=on?'':'none';
}

// ── SECTION 2: Full Battlefield ──
const bfWrap=document.getElementById('bf-wrap');

// Ground layer
bfWrap.innerHTML=`<img id="bf-ground" src="battlefield-ground.png" style="z-index:0">`;

// SVG terrain layer
let svgPaths='';terrain.forEach(t=>{t.paths.forEach(p=>{svgPaths+=`<path d="${p.d}" fill="${p.fill}"/>`;});});
bfWrap.innerHTML+=`<svg id="bf-svg" viewBox="0 0 720 528" preserveAspectRatio="none" style="z-index:1">${svgPaths}</svg>`;

// Floor image layers (clipped to each terrain bbox)
let floorHtml='<svg id="bf-floor" viewBox="0 0 720 528" preserveAspectRatio="none" style="z-index:2"><defs>';
terrain.forEach(t=>{
  const b=bbox(t);
  floorHtml+=`<clipPath id="clip-${t.id}"><rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}"/></clipPath>`;
});
floorHtml+='</defs>';
terrain.forEach(t=>{
  const b=bbox(t);const imgs=getImages(t);
  floorHtml+=`<image href="${imgs.bottom}" x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" clip-path="url(#clip-${t.id})" preserveAspectRatio="xMidYMid slice"/>`;
});
floorHtml+='</svg>';
bfWrap.innerHTML+=floorHtml;

// Models layer
let modelsHtml='<svg id="bf-models" viewBox="0 0 720 528" preserveAspectRatio="none" style="z-index:3">';
units.forEach(u=>{modelsHtml+=modelSvg(u.x,u.y,u.r,u.type,u.color);});
// Objectives
objectives.forEach((o,i)=>{
  let pts=[];for(let j=0;j<6;j++){const a=Math.PI*2*j/6-Math.PI/6;pts.push((o.x+10*Math.cos(a)).toFixed(1)+','+(o.y+10*Math.sin(a)).toFixed(1));}
  modelsHtml+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#fbca1b" stroke-width="2" opacity="0.8"/>`;
  modelsHtml+=`<text x="${o.x}" y="${o.y+4}" text-anchor="middle" fill="#fbca1b" font-size="9" font-weight="bold">0${i+1}</text>`;
});
// Deployment zones
modelsHtml+=`<rect x="0" y="0" width="240" height="528" fill="${IMP}" opacity="0.06"/>`;
modelsHtml+=`<rect x="480" y="0" width="240" height="528" fill="${ORK}" opacity="0.06"/>`;
modelsHtml+='</svg>';
bfWrap.innerHTML+=modelsHtml;

// Top image layers
let topHtml='<svg id="bf-top" viewBox="0 0 720 528" preserveAspectRatio="none" style="z-index:4"><defs>';
terrain.forEach(t=>{if(t.type==='ruins'){topHtml+=`<clipPath id="clipt-${t.id}"><rect x="${bbox(t).x}" y="${bbox(t).y}" width="${bbox(t).w}" height="${bbox(t).h}"/></clipPath>`;}});
topHtml+='</defs>';
terrain.forEach(t=>{
  if(t.type!=='ruins') return;
  const b=bbox(t);const imgs=getImages(t);
  const src=imgs.top||imgs.bottom;
  topHtml+=`<image href="${src}" x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" clip-path="url(#clipt-${t.id})" preserveAspectRatio="xMidYMid slice"/>`;
});
topHtml+='</svg>';
bfWrap.innerHTML+=topHtml;

// Battlefield toggle controls
document.querySelectorAll('[data-bf]').forEach(cb=>{
  cb.addEventListener('change',()=>{
    const map={ground:'bf-ground',svg:'bf-svg',floor:'bf-floor',models:'bf-models',top:'bf-top'};
    const el=document.getElementById(map[cb.dataset.bf]);
    if(el) el.style.display=cb.checked?'':'none';
  });
});

// ── SECTION 4: Image Generation ──
async function generateImage(){
  const key=document.getElementById('gen-key').value.trim();
  const prompt=document.getElementById('gen-prompt').value.trim();
  const result=document.getElementById('gen-result');
  if(!key){result.innerHTML='<p style="color:#f66">API key required</p>';return;}
  result.innerHTML='<p style="color:#00d4ff">Generating...</p>';
  try{
    const refResp=await fetch('reference-ruin.png');
    const refBlob=await refResp.blob();
    const fd=new FormData();
    fd.append('image',refBlob,'reference-ruin.png');
    fd.append('prompt',prompt);
    fd.append('model','gpt-image-1');
    fd.append('size','1024x1024');
    const resp=await fetch('https://api.openai.com/v1/images/edits',{method:'POST',headers:{'Authorization':'Bearer '+key},body:fd});
    const json=await resp.json();
    if(json.data&&json.data[0]){
      const src=json.data[0].url||'data:image/png;base64,'+json.data[0].b64_json;
      result.innerHTML=`<img src="${src}" alt="Generated terrain">`;
    }else{result.innerHTML=`<p style="color:#f66">${JSON.stringify(json.error||json)}</p>`;}
  }catch(e){result.innerHTML=`<p style="color:#f66">${e.message}</p>`;}
}
</script>
</body>
</html>
