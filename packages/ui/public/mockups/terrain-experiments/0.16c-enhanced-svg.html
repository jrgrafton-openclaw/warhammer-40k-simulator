.controls{display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:10px;font-size:11px;align-items:center}
.controls label{cursor:pointer;display:flex;align-items:center;gap:3px}
.controls select{background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:3px;padding:1px 4px;font-size:11px}

<h1>⚔ v0.16c — ENHANCED SVG BATTLEFIELD</h1>
<div class="controls">

  <label><input type="radio" name="bg" value="svg" onchange="toggleBg()">SVG Ground</label>

    <option value="v16-ground-better.png">v16-ground-better</option>
    <option value="bg-variation-1.png">bg-variation-1</option>
    <option value="bg-variation-2.png">bg-variation-2</option>
    <option value="bg-variation-3.png">bg-variation-3</option>

  <span style="color:#444">|</span>
  <label><input type="checkbox" checked onchange="tog('deployZones',this.checked)">Deploy Zones</label>
  <label><input type="checkbox" checked onchange="tog('ruinsBottom',this.checked)">Ruins</label>
  <label><input type="checkbox" onchange="tog('origRuins',this.checked)">Orig Ruins</label>
  <label><input type="checkbox" checked onchange="tog('ruinsTop',this.checked)">Ruins Top</label>

  <label><input type="checkbox" onchange="tog('origScatter',this.checked)">Orig Scatter</label>
  <label><input type="checkbox" checked onchange="tog('models',this.checked)">Models</label>
  <label><input type="checkbox" checked onchange="tog('smoke',this.checked)">Smoke</label>
  <label><input type="checkbox" checked onchange="tog('embers',this.checked)">Embers</label>
  <label><input type="checkbox" checked onchange="tog('objectives',this.checked)">Objectives</label>
</div>
<div class="wrap">

  <pattern id="wall-pat" width="16" height="10" patternUnits="userSpaceOnUse">
    <rect width="16" height="10" fill="#505a60"/><rect x="0" y="0" width="7" height="4" fill="#586268" rx=".3"/>
    <rect x="9" y="0" width="7" height="4" fill="#4e585e" rx=".3"/><rect x="4" y="6" width="7" height="4" fill="#545e64" rx=".3"/>

    <line x1="4" y1="5" x2="4" y2="10" stroke="#3a4044" stroke-width=".8"/>
    <line x1="12" y1="5" x2="12" y2="10" stroke="#3a4044" stroke-width=".8"/>
  </pattern>
  <filter id="wallShadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity=".5"/></filter>
  <filter id="smokeBlur"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

  <g id="ico-infantry"><line x1="-3" y1="3" x2="0" y2="-3" stroke="#fff" stroke-width="1.2"/><line x1="0" y1="-3" x2="3" y2="3" stroke="#fff" stroke-width="1.2"/><line x1="-2" y1="1" x2="2" y2="1" stroke="#fff" stroke-width="1"/></g>
