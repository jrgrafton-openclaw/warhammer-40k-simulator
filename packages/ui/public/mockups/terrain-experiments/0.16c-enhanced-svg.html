<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>v0.16c — Enhanced SVG Battlefield</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#c8d0d8;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-family:Anton,sans-serif;font-size:1.6rem;color:#00d4ff;margin-bottom:4px}
.sub{font-size:0.82rem;color:#6a7a8a;margin-bottom:14px}
.controls{display:flex;flex-wrap:wrap;gap:10px 18px;margin-bottom:16px;font-size:0.82rem}
.controls label{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.controls input{accent-color:#00d4ff}
.map-wrap{position:relative;width:1080px;overflow:hidden;border-radius:12px;border:1px solid #1e2d44;background:#0c1218}
.map-wrap svg{display:block;width:100%;height:auto}
.obj-area-ring{position:absolute;width:72px;height:72px;border:2px solid rgba(255,200,0,0.15);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
.obj-hex{position:absolute;transform:translate(-50%,-50%);pointer-events:none}
.obj-hex svg{width:28px;height:28px}
/* Smoke */
@keyframes smoke-drift{0%{transform:translateX(0);opacity:0.08}50%{transform:translateX(12px);opacity:0.12}100%{transform:translateX(0);opacity:0.08}}
.smoke ellipse{animation:smoke-drift 18s ease-in-out infinite}
/* Embers */
.ember{position:absolute;border-radius:50%;pointer-events:none}
@keyframes ember-drift{0%{transform:translateX(0) translateY(0);opacity:0.5}25%{transform:translateX(40px) translateY(-6px);opacity:0.35}50%{transform:translateX(90px) translateY(4px);opacity:0.45}75%{transform:translateX(140px) translateY(-8px);opacity:0.3}100%{transform:translateX(180px) translateY(2px);opacity:0}}
</style>

// Generate embers
(function(){
const c=document.getElementById('ly-embers');
for(let i=0;i<35;i++){
const d=document.createElement('div');
d.className='ember';
const sz=2+Math.random()*2.5;
const x=Math.random()*100;
const y=Math.random()*100;
const dur=8+Math.random()*12;
const del=Math.random()*dur;
d.style.cssText=`width:${sz}px;height:${sz}px;background:rgba(255,${140+Math.random()*40|0},${40+Math.random()*30|0},${0.3+Math.random()*0.2});left:${x}%;top:${y}%;animation:ember-drift ${dur}s linear ${del}s infinite`;
c.appendChild(d);
}
})();

function tog(){
const gr=document.querySelector('input[name=ground]:checked').value;
document.getElementById('ly-ai-ground').style.display=gr==='ai'?'':'none';
document.getElementById('ly-svg-ground').style.display=gr==='svg'?'':'none';
const m={dz:'ly-dz',ruins:'ly-ruins',scatter:'ly-scatter',models:'ly-models',smoke:'ly-smoke',embers:'ly-embers',obj:'ly-obj'};
for(const[k,id]of Object.entries(m)){
const el=document.getElementById(id);
const on=document.getElementById('ck-'+k).checked;
if(el.tagName==='g'||el.tagName==='G') el.style.display=on?'':'none';
else el.style.display=on?'':'none';
}
}
