<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v0.16a — Per-Piece Compositing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;color:#c8d0e0;font-family:'Segoe UI',sans-serif;padding:24px;min-height:100vh}
  h1{font-family:'Anton',sans-serif;font-size:28px;color:#00d4ff;letter-spacing:2px;margin-bottom:4px}
  .subtitle{font-size:13px;color:#607090;margin-bottom:20px}
  .layer-toggles{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .layer-toggles label{font-size:12px;color:#8090a8;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;background:#0f1520;border:1px solid #1e2d44;border-radius:6px;padding:4px 10px}
  .layer-toggles input[type=checkbox]{accent-color:#00d4ff;width:14px;height:14px}
  .map-wrap{position:relative;width:1080px;max-width:100%;margin:0 auto;background:#080c10;border-radius:12px;overflow:hidden;border:1px solid #1e2d44}
  .map-wrap svg{display:block;width:100%;height:auto}
  .embers{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .ember{position:absolute;border-radius:50%;animation:ember-rise linear infinite}
  @keyframes ember-rise{0%{opacity:0;transform:translateY(0) translateX(0)}10%{opacity:0.6}70%{opacity:0.3}100%{opacity:0;transform:translateY(-120px) translateX(var(--sway))}}
</style>
</head>
<body>
<h1>⚔️ v0.16a — Per-Piece Compositing</h1>
<p class="subtitle">AI-generated terrain textures composited per-piece onto SVG battlefield</p>
<div class="layer-toggles">
  <label><input type="checkbox" checked onchange="t('layer-bf')">☑ Battlefield</label>
  <label><input type="checkbox" checked onchange="t('layer-dz')">☑ Deploy Zones</label>
  <label><input type="checkbox" checked onchange="t('layer-terrain')">☑ SVG Terrain</label>
  <label><input type="checkbox" checked onchange="t('layer-floor')">☑ Floor Layer</label>
  <label><input type="checkbox" checked onchange="t('layer-models')">☑ Models</label>
  <label><input type="checkbox" checked onchange="t('layer-top')">☑ Top Layer</label>
  <label><input type="checkbox" checked onchange="document.getElementById('embers').style.display=this.checked?'':'none'">☑ Embers</label>
</div>
<div class="map-wrap">

  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><rect width="60" height="60" fill="none"/><line x1="0" y1="0" x2="60" y2="0" stroke="rgba(180,160,80,0.06)" stroke-width="0.5"/><line x1="0" y1="0" x2="0" y2="60" stroke="rgba(180,160,80,0.06)" stroke-width="0.5"/><line x1="12" y1="0" x2="12" y2="60" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="24" y1="0" x2="24" y2="60" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="36" y1="0" x2="36" y2="60" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="48" y1="0" x2="48" y2="60" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="0" y1="12" x2="60" y2="12" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="0" y1="24" x2="60" y2="24" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="0" y1="36" x2="60" y2="36" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/><line x1="0" y1="48" x2="60" y2="48" stroke="rgba(180,160,80,0.03)" stroke-width="0.3"/></pattern>
